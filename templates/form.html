<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Invoice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .container { max-width: 500px; margin-top: 2rem; }
        .card { border-radius: 1rem; }
        .form-label { font-weight: 500; }
    </style>
</head>
<body>
<div class="container">
    <div class="card shadow p-4">
        <h2 class="mb-4 text-center">Invoice Assistant</h2>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Client Name</label>
                <input type="text" class="form-control" name="client_name" placeholder="Client Name">
            </div>
            <div class="mb-3">
                <label class="form-label">Select Services</label>
                {% for name, price in services.items() %}
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="services" value="{{ name }}" id="service-{{ loop.index }}">
                    <label class="form-check-label" for="service-{{ loop.index }}">
                        {{ name }} (₹{{ '%.2f'|format(price) }})
                    </label>
                </div>
                {% endfor %}
            </div>
            <div class="mb-3">
                <label class="form-label">Bank Name</label>
                <input type="text" class="form-control" name="bank_name" placeholder="Example Bank">
            </div>
            <div class="mb-3">
                <label class="form-label">Account Number</label>
                <input type="text" class="form-control" name="account_number" placeholder="123456789">
            </div>
            <div class="mb-3">
                <label class="form-label">IFSC Code</label>
                <input type="text" class="form-control" name="ifsc_code" placeholder="EXAMPLE123">
            </div>
            <button type="submit" class="btn btn-primary w-100">Generate Invoice</button>
        </form>
    </div>
</div>
</body>
</html>
